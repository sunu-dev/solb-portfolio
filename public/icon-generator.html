<!DOCTYPE html>
<html>
<head>
    <title>SOLB Icon Generator</title>
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f0f0f0;flex-direction:column;gap:20px;">
    <canvas id="icon" width="128" height="128" style="border:1px solid #ccc;"></canvas>
    <button onclick="download()" style="padding:12px 32px;font-size:16px;background:#3182F6;color:white;border:none;border-radius:8px;cursor:pointer;">PNG 다운로드 (128px)</button>

    <script>
        const canvas = document.getElementById('icon');
        const ctx = canvas.getContext('2d');
        const W = 128, H = 128;

        // White background
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, W, H);

        // Draw "SB" stretched to fill entire 128x128
        ctx.fillStyle = '#3182F6';
        ctx.font = '900 100px "Arial Black", "Impact", sans-serif';

        // Measure actual text width
        const m = ctx.measureText('SB');
        const textW = m.width;
        const textH = 100; // approximate cap height

        // Scale to fill entire canvas with small padding (4px)
        const pad = 4;
        const sx = (W - pad * 2) / textW;
        const sy = (H - pad * 2) / (textH * 0.75); // 0.75 = cap height ratio

        ctx.save();
        ctx.translate(W / 2, H / 2);
        ctx.scale(sx, sy);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('SB', 0, 5);
        ctx.restore();

        function download() {
            const link = document.createElement('a');
            link.download = 'solb-icon-128.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
