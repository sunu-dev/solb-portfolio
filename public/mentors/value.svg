<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#D1FAE5"/>

  <!-- Body -->
  <ellipse cx="100" cy="130" rx="36" ry="38" fill="#92400E"/>

  <!-- Wings -->
  <ellipse cx="67" cy="127" rx="15" ry="28" fill="#78350F" transform="rotate(-8 67 127)"/>
  <ellipse cx="133" cy="127" rx="15" ry="28" fill="#78350F" transform="rotate(8 133 127)"/>

  <!-- Head -->
  <circle cx="100" cy="83" r="30" fill="#B45309"/>

  <!-- Ear tufts -->
  <path d="M86 57 L81 40 L91 55 Z" fill="#92400E"/>
  <path d="M114 57 L119 40 L109 55 Z" fill="#92400E"/>

  <!-- Face disc -->
  <ellipse cx="100" cy="87" rx="21" ry="19" fill="#FDE68A"/>

  <!-- Eyes -->
  <circle cx="89" cy="83" r="9" fill="white"/>
  <circle cx="111" cy="83" r="9" fill="white"/>
  <circle cx="89" cy="83" r="6" fill="#1B4332"/>
  <circle cx="111" cy="83" r="6" fill="#1B4332"/>
  <circle cx="87" cy="81" r="2" fill="white"/>
  <circle cx="109" cy="81" r="2" fill="white"/>

  <!-- Beak -->
  <path d="M96 93 L100 99 L104 93 Z" fill="#F59E0B"/>

  <!-- Magnifying glass -->
  <circle cx="140" cy="106" r="14" stroke="#1B4332" stroke-width="3.5" fill="rgba(255,255,255,0.75)"/>
  <line x1="150" y1="116" x2="162" y2="128" stroke="#1B4332" stroke-width="4" stroke-linecap="round"/>

  <!-- Chart inside magnifying glass -->
  <polyline points="130,112 135,105 140,109 146,100" stroke="#059669" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="146" cy="100" r="2" fill="#059669"/>
</svg>
